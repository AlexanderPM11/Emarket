version: '3.8'

services:
  web:
    image: emarket-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    # ports:
    #   - "${PORT:-8080}:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - UseInMemoryDatabase=false
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=EmarketDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrongDefaultPassword123!};TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - emarket-uploads:/app/wwwroot/Image
    restart: always

  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrongDefaultPassword123!}
    # ports:
    #   - "1433:1433"

    volumes:
      - emarket-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/1433'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always



volumes:
  emarket-uploads:
  emarket-db-data:
